<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="stylesheet" href="./styles.css">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon.png">
    <title>Đồ chơi</title>
</head>
<body>

<div class="tabs-wrap">
    <div class="tabs">
        <div class="tab active" data-tab="maihoa">🌸 Mai Hoa</div>
        <div class="tab" data-tab="fullcustom">☷ Full custom</div>
        <div class="tab" data-tab="tarot">🔮 Tarot</div>
        <div class="tab" data-tab="decision">🎡 Decision</div>
    </div>
</div>

<div class="content">
    <div class="panel active" id="maihoa-container">
        <div id="result-display"></div>
    </div>
    <div class="panel" id="fullcustom-container">
        <div id="form-area">
            <!-- SECTION 1: THOI GIAN -->
              <div class="section-box">
                <div class="section-title">THỜI GIAN</div>
                <label class="checkbox-line">
                  <input type="checkbox" id="fc-now">
                  Bây giờ
                </label>
                <div class="time-grid">
                  <select id="fc-hour">
                    
                  </select>
                  <select id="fc-day"></select>
                  <select id="fc-month"></select>
                  <select id="fc-year"></select>
                </div>
              </div>

              <!-- SECTION 2: PHUONG PHAP -->
              <div class="section-box">
                <div class="section-title">PHƯƠNG PHÁP LẬP QUẺ</div>
                <select id="fc-method">
                  <option value="MaiHoa">Mai Hoa</option>
                  <option value="LucHao">Lục Hào</option>
                </select>
              </div>

              <!-- SECTION 3: LUC HAO -->
              <div class="section-box" id="lucHaoBox" style="display:none;">
                <div class="section-title">QUẺ LỤC HÀO</div>
                    <div class="double-grid">
                      <div>
                        <label>Quái Thượng</label>
                        <select id="fc-up">
                          <option value="111">1. Càn Thiên</option>
                          <option value="110">2. Đoài Trạch</option>
                          <option value="101">3. Li Hỏa</option>
                          <option value="100">4. Chấn Lôi</option>
                          <option value="011">5. Tốn Phong</option>
                          <option value="010">6. Khảm Thủy</option>
                          <option value="001">7. Cấn Sơn</option>
                          <option value="000">8. Khôn Địa</option>
                        </select>
                      </div>
                      <div>
                        <label>Quái Hạ</label>
                        <select id="fc-down">
                          <option value="111">1. Càn Thiên</option>
                          <option value="110">2. Đoài Trạch</option>
                          <option value="101">3. Li Hỏa</option>
                          <option value="100">4. Chấn Lôi</option>
                          <option value="011">5. Tốn Phong</option>
                          <option value="010">6. Khảm Thủy</option>
                          <option value="001">7. Cấn Sơn</option>
                          <option value="000">8. Khôn Địa</option>
                        </select>
                      </div>
                    </div>

                    <div class="hao-grid">
                      <label><input type="checkbox" class="hao-cb" value="1"> Hào 1</label>
                      <label><input type="checkbox" class="hao-cb" value="2"> Hào 2</label>
                      <label><input type="checkbox" class="hao-cb" value="3"> Hào 3</label>
                      <label><input type="checkbox" class="hao-cb" value="4"> Hào 4</label>
                      <label><input type="checkbox" class="hao-cb" value="5"> Hào 5</label>
                      <label><input type="checkbox" class="hao-cb" value="6"> Hào 6</label>
                    </div>

                    <button class="submit-btn" id="btnLucHao">Submit Quẻ Lục Hào</button>
                </div>

                <!-- SECTION 4: MAI HOA -->
                <div class="section-box" id="maiHoaBox">
                    <div class="section-title">QUẺ MAI HOA</div>
                    <button class="submit-btn" id="btnMaiHoa">Submit Quẻ Mai Hoa</button>
                </div>
            </div>
            <!-- SECTION 5: RESULT -->
                <div id="custom-container"></div>
        </div>

    </div>
    <div class="panel" id="tarot-container">
        <div class="section-box"><h3>🔮 Tarot</h3><p>Tính năng đang phát triển...</p></div>
    </div>

    <div class="panel" id="decision-container">
        <div class="section-box"><h3>🎡 Decision</h3><p>Tính năng đang phát triển...</p></div>
    </div>
</div>

<footer><span id="build-info">Đang kiểm tra phiên bản...</span></footer>

<script src="./serverSide.js"></script>
<script src="./clientSide.js"></script>

<script>
    // Chỉ lắng nghe sự kiện click và gọi hàm từ clientSide.js
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
            switchTab(t.dataset.tab);
        });
    });

    // Khởi tạo khi load xong
    window.onload = () => switchTab('maihoa');

    // Load build info từ file txt
    fetch('./build.txt?ts=' + Date.now())
        .then(r => r.text())
        .then(v => { document.getElementById('build-info').textContent = 'Build: ' + v.trim(); });

    // Đăng ký Service Worker cho PWA
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
