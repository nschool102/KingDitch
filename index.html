<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon.png">
    <title>King Dịtch</title>
    <style>
        :root { --bg: #0f0f1a; --surface: #1a1a2e; --accent: #6c63ff; --text: #f0f0ff; --text3: #6666aa; --border: rgba(108,99,255,0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .hdr { background: var(--surface); padding: 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .tabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 5px; }
        .tabs { display: flex; gap: 5px; overflow-x: auto; }
        .tab { padding: 10px; cursor: pointer; color: var(--text3); font-size: 13px; white-space: nowrap; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .content { flex: 1; overflow-y: auto; padding: 16px; }
        .panel { display: none; }
        .panel.active { display: block; }
        footer { padding: 10px; text-align: center; font-size: 10px; color: #21ff00; }
    </style>
</head>
<body>

<div class="hdr">
    <h1>King Dịtch</h1>
</div>

<div class="tabs-wrap">
    <div class="tabs">
        <div class="tab active" data-tab="maihoa">🌸 Mai Hoa</div>
        <div class="tab" data-tab="luchao">☷ Lục Hào</div>
        <div class="tab" data-tab="fullcustom">⚙️ Full Custom</div>
        <div class="tab" data-tab="decision">🎡 Decision</div>
    </div>
</div>

<div class="content">
    <div class="panel active" id="maihoa-container"></div>
    <div class="panel" id="luchao-container"></div>
    <div class="panel" id="fullcustom-container">
        </div>
    <div class="panel" id="decision-container"></div>
</div>

<footer><span id="build-info">Đang kiểm tra phiên bản...</span></footer>

<script src="./serverSide.js"></script>
<script src="./clientSide.js"></script>

<script>
    // Xử lý chuyển tab
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
            // Cập nhật giao diện tab
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            
            // Gọi hàm logic switchTab đã định nghĩa trong clientSide.js
            switchTab(t.dataset.tab);
        });
    });

    // Load build info từ file txt
    fetch('./build.txt?ts=' + Date.now())
        .then(r => r.text())
        .then(v => { document.getElementById('build-info').textContent = 'Build: ' + v.trim(); });

    // Đăng ký Service Worker cho PWA
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
